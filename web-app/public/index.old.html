<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" type="text/css" href="css/plant_saturation.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Bio::Neos Plant Monitor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <header class="header_container"><h1>Bio::Neos Plant Monitor</h1></header>
    <div class="body_container">
      <div
        class="bar_container"
        height="100%"
        width="100%"
        style="background: #b85d20"
      >
        <div id="main_container">
          <div id="pbar" class="progress-pie-chart" data-percent="0">
            <div class="ppc-progress">
              <div class="ppc-progress-fill"></div>
            </div>
            <div class="ppc-percents">
              <div class="pcc-percents-wrapper">
                <img
                  src="img/transparent_leaves_1.png"
                  height="174.91304px"
                  width="174.91304px"
                />
              </div>
            </div>
          </div>

          <progress
            style="display: none"
            id="progress_bar"
            value="0"
            max="100"
          ></progress>
        </div>
      </div>
    </div>
    <script src="js/jquery-3.1.1.min.js"></script>
    <script src="js/rainbowvis.js"></script>
    <script src="js/plant_saturation.js"></script>
  </body>
</html>
